services:
  bot:
    build: .
    container_name: telegram-transcription-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?Set TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:?Set TELEGRAM_ALLOWED_USER_IDS}
      ENABLE_SUMMARY: ${ENABLE_SUMMARY:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SUMMARY_MODEL: ${SUMMARY_MODEL:-}
      SUMMARY_DEFAULT_LANGUAGE: ${SUMMARY_DEFAULT_LANGUAGE:-en}
      TRANSCRIPTION_MODEL: ${TRANSCRIPTION_MODEL:-turbo}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_CPU_THREADS: ${WHISPER_CPU_THREADS:-4}
      WHISPER_NUM_WORKERS: ${WHISPER_NUM_WORKERS:-1}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
      WHISPER_BEAM_SIZE: ${WHISPER_BEAM_SIZE:-5}
      WHISPER_BEST_OF: ${WHISPER_BEST_OF:-1}
      WHISPER_VAD_FILTER: ${WHISPER_VAD_FILTER:-true}
      WHISPER_VAD_MIN_SILENCE_DURATION_MS: ${WHISPER_VAD_MIN_SILENCE_DURATION_MS:-700}
      WHISPER_CONDITION_ON_PREVIOUS_TEXT: ${WHISPER_CONDITION_ON_PREVIOUS_TEXT:-false}
      MAX_MEDIA_MINUTES: ${MAX_MEDIA_MINUTES:-60}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-25}
      MAX_TRANSCRIPT_CHARS: ${MAX_TRANSCRIPT_CHARS:-120000}
      TEMP_DIR: ${TEMP_DIR:-/app/tmp}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FFMPEG_BIN: ${FFMPEG_BIN:-ffmpeg}
      DOWNLOAD_TIMEOUT_SEC: ${DOWNLOAD_TIMEOUT_SEC:-1200}
      CONVERSION_TIMEOUT_SEC: ${CONVERSION_TIMEOUT_SEC:-600}
      TRANSCRIPTION_TIMEOUT_SECONDS: ${TRANSCRIPTION_TIMEOUT_SECONDS:-1800}
      SUMMARY_TIMEOUT_SEC: ${SUMMARY_TIMEOUT_SEC:-120}
      SUMMARY_DIRECT_MAX_CHARS: ${SUMMARY_DIRECT_MAX_CHARS:-11000}
      SUMMARY_CHUNK_CHARS: ${SUMMARY_CHUNK_CHARS:-6000}
      SUMMARY_CHUNK_OVERLAP_CHARS: ${SUMMARY_CHUNK_OVERLAP_CHARS:-300}
      SUMMARY_MAX_OUTPUT_TOKENS: ${SUMMARY_MAX_OUTPUT_TOKENS:-800}
      SUMMARY_PENDING_TTL_SEC: ${SUMMARY_PENDING_TTL_SEC:-900}
      TELEGRAM_MESSAGE_CHUNK_SIZE: ${TELEGRAM_MESSAGE_CHUNK_SIZE:-3900}
      INSTAGRAM_COOKIE_FILE: ${INSTAGRAM_COOKIE_FILE:-}
      INSTAGRAM_COOKIES_FROM_BROWSER: ${INSTAGRAM_COOKIES_FROM_BROWSER:-}
      INSTAGRAM_COOKIES_TXT: ${INSTAGRAM_COOKIES_TXT:-}
    volumes:
      - ./tmp:/app/tmp
    restart: unless-stopped
